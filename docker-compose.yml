x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - /home/andre/.nanobot:~/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    user: "${UID:-1000}:${GID:-1000}"
    command: ["gateway"]
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
    ports:
      - 18790:18790
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M


networks:
  mcp-network:
    name: mcp-network
    external: true
